<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location Share</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0f1419;color:#e0e0e8;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.top{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#161b22;border-bottom:1px solid #21262d;flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700}
button{font-family:inherit}
.btn{padding:8px 14px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
.btn:disabled{opacity:.5;cursor:wait}
.bg{background:#1a6b52;color:#fff}.bg:hover{background:#156b4a}
.bo{background:transparent;border:1px solid #30363d;color:#8b949e}
.br{background:#da3633;color:#fff}
.wrap{display:flex;flex:1;overflow:hidden}
.side{width:320px;background:#161b22;border-right:1px solid #21262d;display:flex;flex-direction:column;flex-shrink:0}
.s-top{padding:12px;border-bottom:1px solid #21262d;display:flex;justify-content:space-between;align-items:center}
.s-lbl{font-size:11px;font-weight:600;color:#8b949e;letter-spacing:.5px}
.cnt{font-size:10px;background:rgba(45,138,110,.15);color:#3fb950;padding:2px 8px;border-radius:10px;font-weight:700}
.tabs{display:flex;padding:4px 8px;gap:2px;background:#0d1117}
.tabs button{flex:1;padding:6px;border:none;border-radius:5px;font-size:10px;font-weight:600;background:transparent;color:#6e7681;cursor:pointer}
.tabs button.on{background:rgba(45,138,110,.12);color:#3fb950}
.cards{flex:1;overflow-y:auto;padding:6px}
.lbox{margin:6px;padding:12px;background:rgba(45,138,110,.1);border:1px solid rgba(45,138,110,.3);border-radius:10px}
.lbox-t{font-size:10px;color:#3fb950;font-weight:700;margin-bottom:6px}
.lbox-url{font-family:'JetBrains Mono';font-size:11px;color:#7ee2c0;background:rgba(0,0,0,.3);padding:8px;border-radius:6px;word-break:break-all;margin-bottom:8px;user-select:all;line-height:1.5}
.lbox-b{display:flex;gap:4px}
.lbox-b .btn{flex:1;font-size:11px;padding:6px}
.cd{padding:10px 12px;border:1px solid #21262d;border-radius:8px;margin-bottom:4px;cursor:pointer;transition:.15s}
.cd:hover{border-color:#30363d;background:rgba(255,255,255,.015)}
.cd.sel{border-color:#1a6b52;background:rgba(45,138,110,.04)}
.cd-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.cd-id{font-family:'JetBrains Mono';font-size:11px;font-weight:600;color:#3fb950}
.cd-m{font-size:10px;color:#6e7681;line-height:1.5}
.badge{padding:2px 6px;border-radius:8px;font-size:9px;font-weight:700;display:inline-flex;align-items:center;gap:3px}
.b-live{background:rgba(45,138,110,.15);color:#3fb950}
.b-stop{background:rgba(110,118,129,.12);color:#8b949e}
.b-wait{background:rgba(187,128,9,.12);color:#d29922}
.b-open{background:rgba(58,134,255,.12);color:#58a6ff}
.dot{width:5px;height:5px;border-radius:50%;background:#3fb950;animation:bl 1s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.2}}
.mapw{flex:1;position:relative}
#map{width:100%;height:100%}
.leaflet-container{background:#0d1117} .leaflet-pane{z-index:400!important} .leaflet-top,.leaflet-bottom{z-index:800!important}
.dp{position:absolute;top:8px;right:8px;width:300px;max-height:calc(100% - 16px);background:rgba(22,27,34,.96);border:1px solid #30363d;border-radius:12px;overflow-y:auto;z-index:99999;display:none}
.dp.show{display:block}
.dp-h{padding:12px;border-bottom:1px solid #21262d;display:flex;justify-content:space-between;align-items:center}
.dp-x{width:24px;height:24px;border:none;border-radius:5px;background:#21262d;color:#8b949e;cursor:pointer;font-size:12px}
.dp-b{padding:12px}
.sr{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin:8px 0}
.sb{text-align:center;padding:8px;background:#0d1117;border-radius:6px}
.sv{font-size:14px;font-weight:700;font-family:'JetBrains Mono'}
.sl{font-size:8px;color:#6e7681;margin-top:2px}
.er{display:flex;align-items:center;gap:6px;padding:5px 0;font-size:11px;color:#c9d1d9;border-bottom:1px solid rgba(255,255,255,.03)}
.er:last-child{border:none}
.et{margin-left:auto;font-family:'JetBrains Mono';font-size:9px;color:#6e7681}
.co{font-family:'JetBrains Mono';font-size:10px;color:#8b949e;padding:5px 8px;background:#0d1117;border-radius:4px;margin:4px 0}
.gl{display:block;text-align:center;padding:7px;background:rgba(45,138,110,.08);border-radius:6px;color:#3fb950;font-size:11px;font-weight:600;text-decoration:none;margin:6px 0}
.phi{width:100%;border-radius:6px;margin:6px 0;cursor:pointer}
.emp{display:flex;flex-direction:column;align-items:center;padding:40px 16px;color:#484f58;text-align:center;font-size:12px}
.s-acts{padding:8px 12px;border-top:1px solid #21262d;display:flex;gap:4px}
.s-acts .btn{flex:1;font-size:10px;padding:5px}
@media(max-width:768px){.side{width:100%;max-height:40%}.wrap{flex-direction:column}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px}
</style>
</head>
<body>
<div class="top">
  <div class="logo"><span style="font-size:18px">📍</span> Location Share</div>
  <button class="btn bg" id="newBtn" onclick="crear()">+ Nueva solicitud</button>
</div>
<div class="wrap">
  <div class="side">
    <div class="s-top"><span class="s-lbl">SESIONES</span><span class="cnt" id="total">0</span></div>
    <div class="tabs" id="tabs"></div>
    <div class="cards" id="cards"></div>
    <div class="s-acts">
      <button class="btn bo" onclick="borrarTodo()">🗑 Borrar todo</button>
    </div>
  </div>
  <div class="mapw">
    <div id="map"></div>
    <div class="dp" id="dp">
      <div class="dp-h">
        <div><span class="cd-id" id="dpId"></span> <span class="badge" id="dpBg"></span></div>
        <button class="dp-x" onclick="cerrarDP()">✕</button>
      </div>
      <div class="dp-b" id="dpB"></div>
    </div>
  </div>
</div>

<script>
var map,data=[],capas={},sel=null,tab='all',poll,nuevoId=null;
var COLS=['#3fb950','#58a6ff','#d29922','#f85149','#bc8cff','#f778ba','#39d2c0','#9be151'];
var TABS=[{k:'all',l:'Todas'},{k:'live',l:'En vivo'},{k:'stopped',l:'Finalizadas'},{k:'waiting',l:'Esperando'}];

// Init
(function(){
  map=L.map('map').setView([-40.15,-71.35],13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'©OSM©CARTO',maxZoom:19}).addTo(map);

  // Render tabs
  var th='';
  for(var i=0;i<TABS.length;i++){
    th+='<button'+(TABS[i].k==='all'?' class="on"':'')+' data-t="'+TABS[i].k+'">'+TABS[i].l+'</button>';
  }
  document.getElementById('tabs').innerHTML=th;

  // Tab clicks
  document.getElementById('tabs').addEventListener('click',function(e){
    if(e.target.tagName!=='BUTTON')return;
    tab=e.target.getAttribute('data-t');
    document.querySelectorAll('.tabs button').forEach(function(b){b.classList.remove('on');});
    e.target.classList.add('on');
    renderCards();
  });

  // Card clicks via event delegation
  document.getElementById('cards').addEventListener('click',function(e){
    var card=e.target.closest('.cd');
    if(!card)return;
    var id=card.getAttribute('data-id');
    if(id) abrirSesion(id);
  });

  cargar();
  poll=setInterval(cargar,4000);
})();

function estado(s){
  if(s.stopped)return'stopped';
  if(s.active)return'live';
  return'waiting';
}

function badgeHTML(s){
  var e=estado(s);
  if(e==='live')return'<span class="badge b-live"><span class="dot"></span>EN VIVO</span>';
  if(e==='stopped')return'<span class="badge b-stop">FINALIZADA</span>';
  if(s.termsAcceptedAt)return'<span class="badge b-open">T&C OK</span>';
  if(s.openedAt)return'<span class="badge b-open">ABIERTO</span>';
  return'<span class="badge b-wait">ESPERANDO</span>';
}

async function cargar(){
  try{
    var r=await fetch('/api/sessions');
    data=await r.json();
    document.getElementById('total').textContent=data.length;
    renderCards();
    renderMapa();
  }catch(e){}
}

function renderCards(){
  var c=document.getElementById('cards');
  var f=data.filter(function(s){if(tab==='all')return true;return estado(s)===tab;});
  var h='';

  if(nuevoId){
    var url=location.origin+'/s/'+nuevoId;
    h+='<div class="lbox"><div class="lbox-t">📍 NUEVA SOLICITUD</div>';
    h+='<div class="lbox-url" id="nUrl">'+url+'</div>';
    h+='<div class="lbox-b"><button class="btn bg" onclick="copiarN()">📋 Copiar</button>';
    h+='<button class="btn bo" onclick="nuevoId=null;renderCards()">✕</button></div></div>';
  }

  if(f.length===0&&!nuevoId){
    h+='<div class="emp"><div style="font-size:28px;opacity:.3;margin-bottom:8px">📡</div>Sin sesiones</div>';
  }

  for(var i=0;i<f.length;i++){
    var s=f[i];
    var ci=data.indexOf(s);
    var col=COLS[ci%COLS.length];
    var t=new Date(s.createdAt).toLocaleString('es-AR',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'});
    var co=s.lastPoint?s.lastPoint.lat.toFixed(4)+','+s.lastPoint.lng.toFixed(4):'—';
    h+='<div class="cd'+(sel===s.id?' sel':'')+'" data-id="'+s.id+'" style="border-left:3px solid '+col+'">';
    h+='<div class="cd-top"><span class="cd-id">#'+s.id+'</span>'+badgeHTML(s)+'</div>';
    h+='<div class="cd-m">📅'+t+' · 📍'+s.pointCount+'pts'+(s.hasPhoto?' · 📸':'')+'<br>'+co+'</div>';
    h+='</div>';
  }
  c.innerHTML=h;
}

function copiarN(){
  var el=document.getElementById('nUrl');
  if(el)navigator.clipboard.writeText(el.textContent).then(function(){el.style.color='#fff';setTimeout(function(){el.style.color='';},1000);});
}

async function crear(){
  var b=document.getElementById('newBtn');
  b.textContent='Creando...';b.disabled=true;
  try{var r=await fetch('/api/session',{method:'POST'});var d=await r.json();nuevoId=d.id;await cargar();}
  catch(e){alert('Servidor iniciando (~30s). Probá de nuevo.');}
  b.textContent='+ Nueva solicitud';b.disabled=false;
}

function renderMapa(){
  for(var i=0;i<data.length;i++){
    var s=data[i];
    if(!s.lastPoint||s.pointCount===0)continue;
    var col=COLS[i%COLS.length];
    if(!capas[s.id])capas[s.id]={};
    var c=capas[s.id];
    if(!c.mk){
      c.mk=L.circleMarker([s.lastPoint.lat,s.lastPoint.lng],{radius:s.active?10:7,fillColor:col,fillOpacity:1,color:'#fff',weight:2}).addTo(map);
    }else{
      c.mk.setLatLng([s.lastPoint.lat,s.lastPoint.lng]);
      c.mk.setStyle({radius:s.active?10:7,fillColor:col});
    }
    if(s.active&&!c.pu){
      c.pu=L.circleMarker([s.lastPoint.lat,s.lastPoint.lng],{radius:18,fillColor:col,fillOpacity:.1,color:col,weight:1,opacity:.2}).addTo(map);
    }else if(s.active&&c.pu){c.pu.setLatLng([s.lastPoint.lat,s.lastPoint.lng]);}
    else if(!s.active&&c.pu){map.removeLayer(c.pu);c.pu=null;}
  }
}

async function abrirSesion(id){
  sel=id;
  renderCards();

  // Open panel with loading state
  var dp=document.getElementById('dp');
  dp.classList.add('show');
  document.getElementById('dpId').textContent='#'+id;
  document.getElementById('dpBg').innerHTML='';
  document.getElementById('dpB').innerHTML='<div style="text-align:center;padding:20px;color:#6e7681">Cargando...</div>';

  try{
    var r=await fetch('/api/session/'+id);
    if(!r.ok)throw new Error('fetch failed');
    var d=await r.json();

    // Badge
    var bg=document.getElementById('dpBg');
    if(d.stopped){bg.className='badge b-stop';bg.textContent='FINALIZADA';}
    else if(d.active){bg.className='badge b-live';bg.innerHTML='<span class="dot"></span>EN VIVO';}
    else if(d.termsAcceptedAt){bg.className='badge b-open';bg.textContent='T&C OK';}
    else if(d.openedAt){bg.className='badge b-open';bg.textContent='ABIERTO';}
    else{bg.className='badge b-wait';bg.textContent='ESPERANDO';}

    var h='';

    // Stats
    if(d.pointCount>0){
      var dist=0;for(var i=1;i<d.points.length;i++)dist+=hav(d.points[i-1],d.points[i]);
      var ds=dist>1000?(dist/1000).toFixed(1)+'km':Math.round(dist)+'m';
      var ts='—';
      if(d.points.length>=2){var mn=Math.round((new Date(d.points[d.points.length-1].timestamp)-new Date(d.points[0].timestamp))/60000);ts=mn>=60?Math.floor(mn/60)+'h'+(mn%60)+'m':mn+'m';}
      h+='<div class="sr"><div class="sb"><div class="sv">'+d.pointCount+'</div><div class="sl">PUNTOS</div></div><div class="sb"><div class="sv">'+ds+'</div><div class="sl">DIST</div></div><div class="sb"><div class="sv">'+ts+'</div><div class="sl">TIEMPO</div></div></div>';
      var la=d.points[d.points.length-1];
      h+='<div class="co">📍 '+la.lat.toFixed(6)+', '+la.lng.toFixed(6)+'</div>';
      h+='<a class="gl" href="https://www.google.com/maps?q='+la.lat+','+la.lng+'" target="_blank">🗺 Google Maps →</a>';
    }

    // Events
    h+='<div style="font-size:10px;color:#6e7681;font-weight:600;margin:10px 0 4px">REGISTRO:</div>';
    h+=evHTML('🔗','Creada',d.createdAt);
    if(d.openedAt)h+=evHTML('📱','Link abierto',d.openedAt);
    if(d.termsAcceptedAt)h+=evHTML('✅','T&C aceptados',d.termsAcceptedAt);
    if(d.pointCount>0)h+=evHTML('📍',d.pointCount+' puntos',d.points[0].timestamp);
    if(d.hasPhoto)h+=evHTML('📸','Foto',d.photoAt);
    if(d.stopped)h+=evHTML('⬛','Finalizada',d.points.length>0?d.points[d.points.length-1].timestamp:null);

    // Photo
    if(d.hasPhoto){
      try{var pr=await fetch('/api/photo/'+id);var pd=await pr.json();
      h+='<img class="phi" src="'+pd.photo+'" onclick="window.open(this.src)"/>';
      }catch(e){}
    }

    // Actions
    if(d.active)h+='<button class="btn br" style="width:100%;margin-top:8px" onclick="parar(\''+id+'\')">⬛ Detener</button>';
    h+='<button class="btn bo" style="width:100%;margin-top:4px" onclick="copiarLink(\''+id+'\')">📋 Copiar link</button>';
    h+='<button class="btn bo" style="width:100%;margin-top:4px;color:#f85149;border-color:rgba(248,81,73,.3)" onclick="borrar(\''+id+'\')">🗑 Eliminar sesión</button>';

    document.getElementById('dpB').innerHTML=h;

    // Draw route
    try{
      if(!capas[id])capas[id]={};
      var c=capas[id];
      if(c.ln){map.removeLayer(c.ln);c.ln=null;}
      if(c.st){map.removeLayer(c.st);c.st=null;}
      if(d.points.length>0){
        var ci=data.findIndex(function(x){return x.id===id;});
        var col=COLS[(ci>=0?ci:0)%COLS.length];
        var ll=d.points.map(function(p){return[p.lat,p.lng];});
        c.ln=L.polyline(ll,{color:col,weight:3,opacity:.7}).addTo(map);
        c.st=L.circleMarker(ll[0],{radius:5,fillColor:'#fff',fillOpacity:1,color:col,weight:2}).addTo(map);
        map.fitBounds(c.ln.getBounds(),{padding:[50,50]});
      }
    }catch(e){}

  }catch(e){
    document.getElementById('dpB').innerHTML='<div style="color:#f85149;padding:20px;text-align:center">Error al cargar datos</div>';
  }
}

function evHTML(ic,tx,ts){
  var t=ts?new Date(ts).toLocaleTimeString('es-AR'):'';
  return'<div class="er"><span>'+ic+'</span> '+tx+'<span class="et">'+t+'</span></div>';
}

function cerrarDP(){
  document.getElementById('dp').classList.remove('show');
  sel=null;renderCards();
  for(var id in capas){var c=capas[id];if(c.ln){map.removeLayer(c.ln);c.ln=null;}if(c.st){map.removeLayer(c.st);c.st=null;}}
}

function copiarLink(id){navigator.clipboard.writeText(location.origin+'/s/'+id);}

async function parar(id){
  if(!confirm('¿Detener?'))return;
  try{await fetch('/api/stop/'+id,{method:'POST'});}catch(e){}
  await cargar();abrirSesion(id);
}

async function borrar(id){
  if(!confirm('¿Eliminar esta sesión?'))return;
  try{await fetch('/api/session/'+id,{method:'DELETE'});}catch(e){}
  cerrarDP();
  // Remove map markers
  if(capas[id]){
    var c=capas[id];
    if(c.mk)map.removeLayer(c.mk);if(c.pu)map.removeLayer(c.pu);
    if(c.ln)map.removeLayer(c.ln);if(c.st)map.removeLayer(c.st);
    delete capas[id];
  }
  await cargar();
}

async function borrarTodo(){
  if(!confirm('¿Borrar TODAS las sesiones?'))return;
  try{await fetch('/api/sessions',{method:'DELETE'});}catch(e){}
  for(var id in capas){var c=capas[id];if(c.mk)map.removeLayer(c.mk);if(c.pu)map.removeLayer(c.pu);if(c.ln)map.removeLayer(c.ln);if(c.st)map.removeLayer(c.st);}
  capas={};
  cerrarDP();
  await cargar();
}

function hav(a,b){var R=6371000,r=function(d){return d*Math.PI/180;},dL=r(b.lat-a.lat),dN=r(b.lng-a.lng),x=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(r(a.lat))*Math.cos(r(b.lat))*Math.sin(dN/2)*Math.sin(dN/2);return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
</script>
</body>
</html>
