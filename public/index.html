<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location Share â€” Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,sans-serif;background:#0f1419;color:#e0e0e8;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* Top Bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:#161b22;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;z-index:100}
.topbar-title{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700}
.topbar-title span{font-size:20px}
.topbar-actions{display:flex;gap:8px}
.btn{padding:8px 16px;border:none;border-radius:8px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:.2s}
.btn-green{background:#1a6b52;color:#fff;box-shadow:0 2px 8px rgba(26,107,82,.3)}
.btn-green:hover{background:#15573f}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,.1);color:#8a9aa0}
.btn-outline:hover{border-color:rgba(255,255,255,.2);color:#c0c8cc}
.btn-red{background:#dc3c3c;color:#fff}

/* Main Layout */
.main{display:flex;flex:1;overflow:hidden}

/* Sidebar */
.sidebar{width:340px;background:#161b22;border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-header{padding:16px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center}
.sidebar-title{font-size:13px;font-weight:600;color:#8a9aa0;letter-spacing:.5px}
.session-count{font-size:11px;background:rgba(45,138,110,.15);color:#34d399;padding:3px 10px;border-radius:20px;font-weight:600}

.tabs{display:flex;gap:2px;padding:8px 16px;background:rgba(0,0,0,.15)}
.tab{flex:1;padding:8px;border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;background:transparent;color:#6a7a80;transition:.2s;letter-spacing:.3px}
.tab.active{background:rgba(45,138,110,.12);color:#34d399}

.session-list{flex:1;overflow-y:auto;padding:8px}
.session-card{padding:14px;border:1px solid rgba(255,255,255,.05);border-radius:12px;margin-bottom:6px;cursor:pointer;transition:.2s;position:relative}
.session-card:hover{border-color:rgba(45,138,110,.3);background:rgba(45,138,110,.03)}
.session-card.selected{border-color:rgba(45,138,110,.5);background:rgba(45,138,110,.06)}
.session-id{font-family:'JetBrains Mono';font-size:12px;font-weight:600;color:#34d399}
.session-meta{font-size:11px;color:#6a7a80;margin-top:6px;line-height:1.7}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;font-size:10px;font-weight:600;letter-spacing:.3px}
.badge-live{background:rgba(45,138,110,.15);color:#34d399}
.badge-live::before{content:'';width:6px;height:6px;border-radius:50%;background:#34d399;animation:blink 1s infinite}
.badge-stopped{background:rgba(140,140,160,.12);color:#8a8a9e}
.badge-waiting{background:rgba(200,180,100,.12);color:#c8a840}
.badge-terms{background:rgba(100,160,255,.12);color:#64a0ff}

/* Map */
.map-container{flex:1;position:relative}
#map{width:100%;height:100%}

/* Detail Panel (overlay on map) */
.detail-panel{position:absolute;top:10px;right:10px;width:320px;max-height:calc(100% - 20px);background:rgba(22,27,34,.95);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden;z-index:50;display:none}
.detail-panel.open{display:flex;flex-direction:column}
.detail-header{padding:16px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center}
.detail-close{width:28px;height:28px;border:none;border-radius:6px;background:rgba(255,255,255,.06);color:#8a9aa0;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.detail-body{padding:16px;overflow-y:auto;flex:1}

.event-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:12px}
.event-row:last-child{border-bottom:none}
.event-icon{font-size:14px;flex-shrink:0}
.event-text{color:#c0c8cc;flex:1}
.event-time{color:#6a7a80;font-family:'JetBrains Mono';font-size:10px;flex-shrink:0}

.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:12px 0}
.stat-item{text-align:center;padding:10px;background:rgba(255,255,255,.03);border-radius:8px}
.stat-val{font-size:16px;font-weight:700;color:#e0e0e8;font-family:'JetBrains Mono'}
.stat-lbl{font-size:9px;color:#6a7a80;letter-spacing:.5px;margin-top:2px}

.photo-thumb{width:100%;border-radius:10px;border:1px solid rgba(255,255,255,.08);margin:10px 0;cursor:pointer}

.coords-small{font-family:'JetBrains Mono';font-size:11px;color:#8a9aa0;padding:6px 10px;background:rgba(255,255,255,.03);border-radius:6px;margin:4px 0}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;color:#4a5a60;text-align:center}
.empty-state .icon{font-size:36px;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:13px;line-height:1.6}

/* Mobile */
@media(max-width:768px){
  .sidebar{width:100%;height:45%;border-right:none;border-bottom:1px solid rgba(255,255,255,.06)}
  .main{flex-direction:column}
  .detail-panel{width:calc(100% - 20px);top:auto;bottom:10px;right:10px;left:10px;max-height:60%}
}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}

.leaflet-container{background:#0d1117}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-title"><span>đź“Ť</span> Location Share</div>
  <div class="topbar-actions">
    <button class="btn btn-green" onclick="createSession()">+ Nueva solicitud</button>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">SESIONES</span>
      <span class="session-count" id="sessionCount">0</span>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="setFilter('all',this)">Todas</button>
      <button class="tab" onclick="setFilter('live',this)">En vivo</button>
      <button class="tab" onclick="setFilter('stopped',this)">Finalizadas</button>
      <button class="tab" onclick="setFilter('waiting',this)">Esperando</button>
    </div>
    <div class="session-list" id="sessionList">
      <div class="empty-state" id="emptyState">
        <div class="icon">đź“ˇ</div>
        <p>No hay sesiones todavĂ­a.<br>CreĂˇ una para empezar.</p>
      </div>
    </div>
  </div>

  <!-- Map -->
  <div class="map-container">
    <div id="map"></div>

    <!-- Detail Panel -->
    <div class="detail-panel" id="detailPanel">
      <div class="detail-header">
        <div>
          <span class="session-id" id="detailId"></span>
          <span class="badge" id="detailBadge" style="margin-left:8px"></span>
        </div>
        <button class="detail-close" onclick="closeDetail()">âś•</button>
      </div>
      <div class="detail-body" id="detailBody"></div>
    </div>
  </div>
</div>

<!-- New session modal -->
<div id="newModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center">
  <div style="background:#1c2128;border-radius:16px;padding:28px;max-width:420px;width:90%;border:1px solid rgba(255,255,255,.08)">
    <h2 style="font-size:18px;margin-bottom:16px;color:#e0e0e8">đź“Ť Nueva solicitud creada</h2>
    <div style="padding:14px;background:rgba(45,138,110,.06);border:1px solid rgba(45,138,110,.15);border-radius:10px;margin-bottom:14px">
      <div style="font-size:11px;color:#6a7a80;margin-bottom:6px;font-weight:600;letter-spacing:.5px">LINK PARA COMPARTIR:</div>
      <div id="modalLink" style="font-family:'JetBrains Mono';font-size:13px;color:#34d399;word-break:break-all;user-select:all"></div>
    </div>
    <div style="font-size:12px;color:#6a7a80;margin-bottom:16px">đź“± CopiĂˇ este link y envialo por WhatsApp</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-green" style="flex:1" onclick="copyModalLink()">đź“‹ Copiar link</button>
      <button class="btn btn-outline" style="flex:1" onclick="closeModal()">Cerrar</button>
    </div>
  </div>
</div>

<script>
let map, allSessions=[], sessionLayers={}, selectedSession=null, filter='all', pollInterval=null;

const COLORS=['#34d399','#64a0ff','#f59e0b','#ef4444','#a78bfa','#ec4899','#06b6d4','#84cc16'];

// Init map
function initMap(){
  map=L.map('map',{zoomControl:true}).setView([-40.15,-71.35],13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'Â© OpenStreetMap Â© CARTO',maxZoom:19
  }).addTo(map);
}

// Poll all sessions
async function pollAll(){
  try{
    const res=await fetch('/api/sessions');
    allSessions=await res.json();
    renderSessionList();
    updateMapMarkers();
    document.getElementById('sessionCount').textContent=allSessions.length;
    if(selectedSession){
      const s=allSessions.find(x=>x.id===selectedSession);
      if(s)updateDetail(s.id);
    }
  }catch(e){}
}

function renderSessionList(){
  const container=document.getElementById('sessionList');
  const empty=document.getElementById('emptyState');
  const filtered=allSessions.filter(s=>{
    if(filter==='live')return s.active;
    if(filter==='stopped')return s.stopped;
    if(filter==='waiting')return!s.active&&!s.stopped;
    return true;
  });
  if(filtered.length===0){empty.style.display='flex';container.innerHTML='';container.appendChild(empty);return}
  empty.style.display='none';

  container.innerHTML=filtered.map((s,i)=>{
    const color=COLORS[i%COLORS.length];
    const badge=s.stopped?'<span class="badge badge-stopped">FINALIZADA</span>':s.active?'<span class="badge badge-live">EN VIVO</span>':s.termsAcceptedAt?'<span class="badge badge-terms">T&C ACEPTADOS</span>':s.openedAt?'<span class="badge badge-waiting">LINK ABIERTO</span>':'<span class="badge badge-waiting">ESPERANDO</span>';
    const time=new Date(s.createdAt).toLocaleString('es-AR',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'});
    const lastCoord=s.lastPoint?`${s.lastPoint.lat.toFixed(4)}, ${s.lastPoint.lng.toFixed(4)}`:'Sin ubicaciĂłn';
    return`<div class="session-card ${selectedSession===s.id?'selected':''}" onclick="selectSession('${s.id}')" style="border-left:3px solid ${color}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="session-id">#${s.id}</span>${badge}
      </div>
      <div class="session-meta">
        đź“… ${time} Â· đź“Ť ${s.pointCount} puntos${s.hasPhoto?' Â· đź“¸ Foto':''}<br>
        <span style="font-family:'JetBrains Mono';font-size:10px;color:#4a5a60">${lastCoord}</span>
      </div>
    </div>`;
  }).join('');
}

function updateMapMarkers(){
  allSessions.forEach((s,i)=>{
    const color=COLORS[i%COLORS.length];
    if(!sessionLayers[s.id]){
      sessionLayers[s.id]={polyline:null,marker:null,startMarker:null,lastCount:0};
    }
    const layer=sessionLayers[s.id];

    if(s.pointCount>0&&s.lastPoint){
      const points=[];// We need full points for polyline, fetch if selected
      if(!layer.marker){
        layer.marker=L.circleMarker([s.lastPoint.lat,s.lastPoint.lng],{
          radius:s.active?10:7,fillColor:color,fillOpacity:1,color:'#fff',weight:2
        }).addTo(map);
        layer.marker.bindPopup(`<b>#${s.id}</b><br>${s.active?'đźź˘ En vivo':'â¬› Finalizada'}<br>đź“Ť ${s.pointCount} puntos`);
        layer.marker.on('click',()=>selectSession(s.id));
      }else{
        layer.marker.setLatLng([s.lastPoint.lat,s.lastPoint.lng]);
        layer.marker.setStyle({radius:s.active?10:7,fillColor:color});
        layer.marker.setPopupContent(`<b>#${s.id}</b><br>${s.active?'đźź˘ En vivo':'â¬› Finalizada'}<br>đź“Ť ${s.pointCount} puntos`);
      }

      // Pulse effect for active
      if(s.active&&!layer.pulseMarker){
        layer.pulseMarker=L.circleMarker([s.lastPoint.lat,s.lastPoint.lng],{
          radius:16,fillColor:color,fillOpacity:.15,color:color,weight:1,opacity:.3
        }).addTo(map);
      }else if(s.active&&layer.pulseMarker){
        layer.pulseMarker.setLatLng([s.lastPoint.lat,s.lastPoint.lng]);
      }else if(!s.active&&layer.pulseMarker){
        map.removeLayer(layer.pulseMarker);layer.pulseMarker=null;
      }
    }
  });
}

async function selectSession(id){
  selectedSession=id;
  renderSessionList();
  await updateDetail(id);

  // Fetch full session and draw route
  try{
    const res=await fetch(`/api/session/${id}`);
    const data=await res.json();
    if(data.points.length>0){
      const idx=allSessions.findIndex(s=>s.id===id);
      const color=COLORS[idx%COLORS.length];
      const layer=sessionLayers[id];

      // Remove old polyline
      if(layer.polyline)map.removeLayer(layer.polyline);
      if(layer.startMarker)map.removeLayer(layer.startMarker);

      // Draw route
      const latlngs=data.points.map(p=>[p.lat,p.lng]);
      layer.polyline=L.polyline(latlngs,{color:color,weight:3,opacity:.7}).addTo(map);

      // Start marker
      layer.startMarker=L.circleMarker([data.points[0].lat,data.points[0].lng],{
        radius:6,fillColor:'#fff',fillOpacity:1,color:color,weight:2
      }).addTo(map).bindPopup('Inicio');

      // Fit bounds
      map.fitBounds(layer.polyline.getBounds(),{padding:[50,50]});
    }
  }catch(e){}
}

async function updateDetail(id){
  const panel=document.getElementById('detailPanel');
  panel.classList.add('open');
  document.getElementById('detailId').textContent='#'+id;

  try{
    const res=await fetch(`/api/session/${id}`);
    const data=await res.json();

    const badge=document.getElementById('detailBadge');
    if(data.stopped){badge.className='badge badge-stopped';badge.textContent='FINALIZADA'}
    else if(data.active){badge.className='badge badge-live';badge.innerHTML='<span></span>EN VIVO'}
    else{badge.className='badge badge-waiting';badge.textContent='ESPERANDO'}

    let html='';

    // Stats
    if(data.pointCount>0){
      let dist=0;
      for(let i=1;i<data.points.length;i++)dist+=haversine(data.points[i-1],data.points[i]);
      const distStr=dist>1000?(dist/1000).toFixed(1)+' km':Math.round(dist)+' m';
      let timeStr='â€”';
      if(data.points.length>=2){
        const mins=Math.round((new Date(data.points[data.points.length-1].timestamp)-new Date(data.points[0].timestamp))/60000);
        timeStr=mins>=60?Math.floor(mins/60)+'h '+(mins%60)+'m':mins+'m';
      }
      html+=`<div class="stat-row">
        <div class="stat-item"><div class="stat-val">${data.pointCount}</div><div class="stat-lbl">PUNTOS</div></div>
        <div class="stat-item"><div class="stat-val">${distStr}</div><div class="stat-lbl">DISTANCIA</div></div>
        <div class="stat-item"><div class="stat-val">${timeStr}</div><div class="stat-lbl">TIEMPO</div></div>
      </div>`;

      // Last position
      const last=data.points[data.points.length-1];
      html+=`<div class="coords-small">đź“Ť ${last.lat.toFixed(6)}, ${last.lng.toFixed(6)}</div>`;
      html+=`<a href="https://www.google.com/maps?q=${last.lat},${last.lng}" target="_blank" style="display:block;text-align:center;padding:8px;background:rgba(45,138,110,.08);border-radius:8px;color:#34d399;font-size:12px;font-weight:600;text-decoration:none;margin:8px 0">đź—ş Google Maps â†’</a>`;
    }

    // Photo
    if(data.hasPhoto){
      try{
        const pRes=await fetch(`/api/photo/${id}`);
        const pData=await pRes.json();
        html+=`<img class="photo-thumb" src="${pData.photo}" onclick="window.open(this.src)"/>
        <div style="font-size:10px;color:#6a7a80;text-align:center">đź“¸ ${new Date(pData.photoAt).toLocaleString('es-AR')}</div>`;
      }catch(e){}
    }

    // Events
    html+='<div style="font-size:11px;color:#6a7a80;font-weight:600;letter-spacing:.5px;margin:14px 0 8px">REGISTRO:</div>';
    const ev=(icon,text,time)=>`<div class="event-row"><span class="event-icon">${icon}</span><span class="event-text">${text}</span><span class="event-time">${time||''}</span></div>`;
    html+=ev('đź”—','SesiĂłn creada',new Date(data.createdAt).toLocaleTimeString('es-AR'));
    if(data.openedAt)html+=ev('đź“±','Link abierto',new Date(data.openedAt).toLocaleTimeString('es-AR'));
    if(data.termsAcceptedAt)html+=ev('âś…','T&C aceptados',new Date(data.termsAcceptedAt).toLocaleTimeString('es-AR'));
    if(data.pointCount>0)html+=ev('đź“Ť','Tracking ('+data.pointCount+' pts)',new Date(data.points[0].timestamp).toLocaleTimeString('es-AR'));
    if(data.hasPhoto)html+=ev('đź“¸','Foto enviada',data.photoAt?new Date(data.photoAt).toLocaleTimeString('es-AR'):'');
    if(data.stopped)html+=ev('â¬›','Finalizada','');

    // Action buttons
    if(data.active){
      html+=`<button class="btn btn-red" style="width:100%;margin-top:12px" onclick="stopSession('${id}')">â¬› Detener seguimiento</button>`;
    }
    html+=`<button class="btn btn-outline" style="width:100%;margin-top:8px" onclick="copySessionLink('${id}')">đź“‹ Copiar link</button>`;

    document.getElementById('detailBody').innerHTML=html;
  }catch(e){document.getElementById('detailBody').innerHTML='<p style="color:#c04040">Error</p>'}
}

function closeDetail(){
  document.getElementById('detailPanel').classList.remove('open');
  selectedSession=null;
  renderSessionList();
  // Remove route polylines
  for(const id in sessionLayers){
    const l=sessionLayers[id];
    if(l.polyline){map.removeLayer(l.polyline);l.polyline=null}
    if(l.startMarker){map.removeLayer(l.startMarker);l.startMarker=null}
  }
}

async function createSession(){
  const btn=document.querySelector('.btn-green');
  btn.textContent='Creando...';btn.disabled=true;
  try{
    const res=await fetch('/api/session',{method:'POST'});
    const data=await res.json();
    const link=window.location.origin+data.url;
    document.getElementById('modalLink').textContent=link;
    document.getElementById('newModal').style.display='flex';
    pollAll();
  }catch(e){alert('Error al conectar. El servidor puede estar iniciando, esperá 30 seg y probá de nuevo.')}
  btn.textContent='+ Nueva solicitud';btn.disabled=false;
}

function copyModalLink(){
  const link=document.getElementById('modalLink').textContent;
  navigator.clipboard.writeText(link);
  event.target.textContent='âś“ Copiado!';
  setTimeout(()=>event.target.textContent='đź“‹ Copiar link',2000);
}

function closeModal(){document.getElementById('newModal').style.display='none'}

function copySessionLink(id){
  navigator.clipboard.writeText(window.location.origin+'/s/'+id);
}

async function stopSession(id){
  if(!confirm('ÂżDetener seguimiento?'))return;
  await fetch(`/api/stop/${id}`,{method:'POST'});
  pollAll();
}

function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderSessionList();
}

function haversine(a,b){const R=6371000,r=d=>d*Math.PI/180,dLat=r(b.lat-a.lat),dLng=r(b.lng-a.lng),x=Math.sin(dLat/2)**2+Math.cos(r(a.lat))*Math.cos(r(b.lat))*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}

// Init
initMap();
pollAll();
pollInterval=setInterval(pollAll,4000);
</script>
</body>
</html>
